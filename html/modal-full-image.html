<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>In-App Message</title>
<style>

  :root {
    --modal-overlay: hsla(0, 0%, 0%, 0.5);
    --modal-radius: 24px;
    --modal-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    --modal-max-width: 600px;
    --modal-border: rgba(13, 13, 13, 0.2);

    --modal-close-bg: hsla(0, 0%, 47%, 0.1);
    --modal-close-bg-hover: hsla(0, 0%, 47%, 0.15);
    --modal-close-color: hsl(0, 0%, 5%);
  }

  /* Dark theme */
  .dark {
    --modal-border: hsla(0, 0%, 100%, 0.2);

    --modal-close-bg: hsla(0, 0%, 100%, 0.1);
    --modal-close-bg-hover: hsla(0, 0%, 100%, 0.15);
    --modal-close-color: hsl(0, 0%, 97%);
  }

  /* Reset & Base */

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Overlay */

  .braze-modal-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--modal-overlay);
    z-index: 9999;
    padding: 16px;
    opacity: 0;
    animation: fadeIn 0.2s ease-out forwards;
  }

  /* Modal Card — full image */

  .braze-modal-wrapper {
    position: relative;
    width: 100%;
    max-width: var(--modal-max-width);
    opacity: 0;
    transform: scale(0.95);
    filter: blur(12px);
    animation: scaleIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) 0.05s forwards;
  }

  .braze-modal {
    position: relative;
    width: 100%;
    border-radius: var(--modal-radius);
    box-shadow: var(--modal-shadow);
    overflow: hidden;
  }

  .braze-modal::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--modal-radius);
    box-shadow: inset 0 0 0 1px var(--modal-border);
    pointer-events: none;
    z-index: 3;
  }

  /* Image */

  .braze-modal__image-wrapper {
    display: block;
    width: 100%;
    cursor: pointer;
  }

  .braze-modal__image {
    width: 100%;
    height: auto;
    aspect-ratio: 6 / 5;
    display: block;
    object-fit: cover;
  }

  /* Close Button — outside card, top-right */

  .braze-modal__close {
    position: absolute;
    top: 0;
    right: -40px; /* 32px button + 8px gap */
    z-index: 2;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--modal-close-bg);
    border: none;
    border-radius: 9999px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .braze-modal__close:hover {
    background: var(--modal-close-bg-hover);
  }

  .braze-modal__close svg {
    width: 14px;
    height: 14px;
    color: var(--modal-close-color);
  }

  /* Animations */

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes scaleIn {
    from {
      opacity: 0;
      transform: scale(0.95);
      filter: blur(12px);
    }
    to {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
    }
  }

  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }

  @keyframes scaleOut {
    from {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
    }
    to {
      opacity: 0;
      transform: scale(0.95);
      filter: blur(12px);
    }
  }

  .braze-modal-overlay--closing {
    animation: fadeOut 0.15s ease-in forwards;
  }

  .braze-modal-overlay--closing .braze-modal-wrapper {
    animation: scaleOut 0.15s ease-in forwards;
  }

  /* Responsive */

  @media (max-width: 425px) {
    .braze-modal-wrapper {
      max-width: 100%;
    }

    .braze-modal__close {
      top: 8px;
      right: 8px;
    }
  }
</style>
</head>
<body>

  <div class="braze-modal-overlay" id="brazeModalOverlay">
    <div class="braze-modal-wrapper">

      <button
        class="braze-modal__close"
        id="brazeModalClose"
        aria-label="Close"
        type="button"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="4" x2="12" y2="12" />
          <line x1="12" y1="4" x2="4" y2="12" />
        </svg>
      </button>

      <div class="braze-modal" role="dialog" aria-modal="true" aria-label="Promotional message">
        <div class="braze-modal__image-wrapper" id="brazeModalImage" data-href="${cta_url}">
          <img
            class="braze-modal__image"
            src="${image_url}"
            alt="${image_alt}"
            loading="eager"
          />
        </div>

      </div>
    </div>
  </div>

  <script>
    (function () {
      /* Theme detection */
      try {
        var parentDoc = window.parent.document.documentElement;
        if (parentDoc && parentDoc.classList.contains('dark')) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}

      var ctaClicked = false;
      var closing = false;

      function notifyParent(action) {
        try {
          window.parent.postMessage({ type: 'braze-iam-event', action: action }, '*');
        } catch (e) {}
      }

      function dismissBraze() {
        if (typeof brazeBridge !== 'undefined') {
          brazeBridge.closeMessage();
        }
      }

      /* Close modal with animation */
      function closeModal() {
        if (closing) return;
        closing = true;

        var overlay = document.getElementById('brazeModalOverlay');
        if (!overlay) { dismissBraze(); return; }

        if (!ctaClicked) {
          notifyParent('closed');
          if (typeof brazeBridge !== 'undefined') {
            brazeBridge.logClick('close');
            brazeBridge.requestImmediateDataFlush();
          }
        }

        overlay.classList.add('braze-modal-overlay--closing');

        var dismissed = false;
        function dismissOnce() {
          if (dismissed) return;
          dismissed = true;
          dismissBraze();
        }

        overlay.addEventListener('animationend', dismissOnce);
        setTimeout(dismissOnce, 300);
      }

      /* Close button */
      var closeBtn = document.getElementById('brazeModalClose');
      if (closeBtn) {
        closeBtn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          closeModal();
        });
      }

      /* Overlay click (click outside to close) */
      var overlay = document.getElementById('brazeModalOverlay');
      if (overlay) {
        overlay.addEventListener('click', function (e) {
          if (e.target === overlay) {
            closeModal();
          }
        });
      }

      /* Image click — navigate to CTA URL */
      var imgWrapper = document.getElementById('brazeModalImage');
      if (imgWrapper) {
        imgWrapper.addEventListener('click', function (e) {
          if (e.target.closest('#brazeModalClose')) return;
          if (ctaClicked) return;
          ctaClicked = true;
          var url = imgWrapper.getAttribute('data-href');

          notifyParent('clicked');

          if (typeof brazeBridge !== 'undefined') {
            brazeBridge.logClick('cta_click');
            brazeBridge.requestImmediateDataFlush();
          }

          if (url && url !== '${cta_url}' && url.trim() !== '') {
            window.parent.location.href = url;
          }

          closeModal();
        });
      }

      /* Escape key to close */
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' || e.keyCode === 27) {
          closeModal();
        }
      });
    })();
  </script>
</body>
</html>
